name: Firmware CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ESP32-C3 firmware
        run: |
          idf.py set-target esp32c3
          idf.py build
